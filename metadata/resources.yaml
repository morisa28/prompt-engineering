version: 1
description: "Prompt Engineering Skill Hub resource registry for routing, composition, eval matching, adapter selection, safety selection, and lesson lookup."

uri_rules:
  format: "@<type>://<category>/<slug>"
  examples:
    - "@branch://software-engineering/bugfix-debugging"
    - "@template://coding-agent/bugfix"
    - "@checklist://natural-language-entry"
    - "@eval://software-engineering/bugfix-debugging/basic"
    - "@adapter://codex-cli"
    - "@safety://medical-boundary"
    - "@lesson://routing/ambiguous-bugfix-request"

resource_types:
  - branch
  - template
  - checklist
  - example
  - eval
  - adapter
  - safety
  - lesson

selection_policy:
  natural_language_entry:
    - Normalize the user request into final deliverable, target tool, known inputs, missing inputs, and risk signals.
    - Select one primary branch by final deliverable.
    - Add auxiliary branches only for tool adaptation, validation, report format, citation, permissions, multimodal input, or safety boundaries.
    - Select adapter resources when a target tool is named.
    - Select safety resources for medical, legal, financial, security, recruiting, privacy, production, or child-related risk.
    - Match eval resources before finalizing when a similar eval case exists.
    - Look up lesson resources for known failure modes and apply their fixes.

resources:
  branches:
    - id: branch:software-engineering.bugfix-debugging
      uri: "@branch://software-engineering/bugfix-debugging"
      path: branches/software-engineering/bugfix-debugging.md
      category: software-engineering
      purpose: "Generate prompts for diagnosing and fixing software failures with root-cause analysis, minimal safe changes, and verification."
      primary_triggers:
        - build failure
        - runtime error
        - failing test
        - CLI error
        - error log
      negative_triggers:
        - new feature from scratch
        - broad rewrite
        - read-only repository analysis
      required_inputs:
        blocking:
          - error log or failure message
          - reproduction steps or failing command
          - working directory or repository context
        optional:
          - environment
          - expected behavior
          - actual behavior
          - recent changes
      linked_templates:
        - "@template://coding-agent/bugfix"
      linked_checklists:
        - "@checklist://coding-agent/final-review"
        - "@checklist://information-missing"
        - "@checklist://prompt-eval-quality"
      linked_examples:
        - "@example://natural-language/bugfix-codex-build"
      linked_evals:
        - "@eval://software-engineering/bugfix-debugging/basic"
        - "@eval://software-engineering/bugfix-debugging/missing-inputs"
        - "@eval://software-engineering/bugfix-debugging/unsafe-shortcut"
      linked_lessons:
        - "@lesson://routing/ambiguous-bugfix-request"
        - "@lesson://prompt-failures/bugfix-missing-verification"
        - "@lesson://unsafe-patterns/delete-tests-to-pass"
      compatible_adapters:
        - "@adapter://codex"
        - "@adapter://codex-cli"
        - "@adapter://claude-code"
        - "@adapter://gemini-cli"
      risk_level_default: medium

