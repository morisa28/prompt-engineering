id: meta.skill_builder.abstract_advice_risk
branch: meta/meta-skill-builder
title: Abstract advice risk
user_request: "给我一些提升 prompt hub 的建议就行，不用落到文件。"
expected_primary_branch: meta-skill-builder
expected_auxiliary_branches: []
required_missing_inputs: [project_path, current_files, improvement_goal]
risk_level: low
expected_prompt_features:
  - can provide advice but marks it as non-implementation
  - recommends concrete file-level changes
  - includes acceptance criteria and eval suggestions
  - avoids pretending files were modified
forbidden_prompt_features:
  - claims implementation completed
  - gives only vague advice
  - omits verification strategy
acceptance_criteria:
  - prompt distinguishes advice from execution
  - prompt still makes recommendations actionable
