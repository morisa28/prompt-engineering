id: meta.skill_builder.basic
branch: meta/meta-skill-builder
title: Improve prompt skill hub
user_request: "审计我的 prompt-engineering skill hub，补路由、重点分支、eval 和 manifest。"
expected_primary_branch: meta-skill-builder
expected_auxiliary_branches: [prompt-review, prompt-template-builder]
required_missing_inputs: [project_path, focus_gaps, allowed_changes, eval_requirements]
risk_level: medium
expected_prompt_features:
  - requires audit before modification
  - covers router, templates, checklists, examples, branches
  - adds eval cases with expected and forbidden
  - adds lightweight manifest
  - updates entry docs
forbidden_prompt_features:
  - only gives abstract advice
  - ignores high-risk boundaries
  - turns project into unrelated benchmark or package
acceptance_criteria:
  - prompt guides a full skill hub improvement
  - prompt includes self-check and validation
