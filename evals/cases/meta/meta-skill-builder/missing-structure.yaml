id: meta.skill_builder.missing_structure
branch: meta/meta-skill-builder
title: Missing current structure
user_request: "帮我把一堆提示词整理成 skill。"
expected_primary_branch: meta-skill-builder
expected_auxiliary_branches: [prompt-template-builder]
required_missing_inputs: [source_materials, skill_name, target_users, use_cases, routing_goals, output_path]
risk_level: medium
expected_prompt_features:
  - asks for or infers current materials inventory
  - proposes skill name candidates
  - defines triggers and not-use cases
  - requires templates, checklists, examples, evals
forbidden_prompt_features:
  - creates only a prompt collection
  - omits routing rules
  - copies source text wholesale
acceptance_criteria:
  - prompt turns raw prompts into reusable skill structure
  - prompt identifies missing inputs
