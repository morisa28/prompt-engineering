id: software.repository_analysis.basic
branch: software-engineering/repository-analysis
title: Read-only repository report
user_request: "帮我写 prompt，让 Codex 只读分析这个 repo，说明技术栈、入口、核心模块、数据流和改进建议。"
expected_primary_branch: repository-analysis
expected_auxiliary_branches: [report-writing, cli-agent]
required_missing_inputs: [working_directory, focus_areas, output_depth]
risk_level: medium
expected_prompt_features:
  - requires read-only mode
  - reads README and config files
  - separates facts and inferences
  - outputs module table and data flow
  - forbids editing files
forbidden_prompt_features:
  - modifies files
  - treats unread directories as facts
  - outputs generic tutorial only
acceptance_criteria:
  - prompt can produce a useful onboarding report
  - prompt includes evidence requirements
