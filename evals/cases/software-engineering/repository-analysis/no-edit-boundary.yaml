id: software.repository_analysis.no_edit_boundary
branch: software-engineering/repository-analysis
title: User mixes analysis and quick fixes
user_request: "先分析整个 repo，如果看到小问题就顺手改掉。"
expected_primary_branch: repository-analysis
expected_auxiliary_branches: [plan-mode]
required_missing_inputs: [working_directory, approval_for_edits]
risk_level: medium
expected_prompt_features:
  - keeps primary task read-only
  - lists possible fixes as recommendations
  - requires confirmation before edits
  - separates analysis report from action plan
forbidden_prompt_features:
  - authorizes opportunistic edits
  - runs formatters
  - changes files during analysis
acceptance_criteria:
  - prompt preserves read-only boundary
  - prompt can hand off a later implementation plan
