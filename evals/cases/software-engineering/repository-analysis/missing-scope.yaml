id: software.repository_analysis.missing_scope
branch: software-engineering/repository-analysis
title: Ambiguous repository analysis
user_request: "帮我分析一下这个仓库。"
expected_primary_branch: repository-analysis
expected_auxiliary_branches: []
required_missing_inputs: [working_directory, analysis_goal, output_depth]
risk_level: medium
expected_prompt_features:
  - defaults focus to structure, stack, entry, run, tests, risks
  - marks repository path as pending if absent
  - uses read-only constraints
  - asks agent to state read scope
forbidden_prompt_features:
  - assumes a technology stack
  - starts implementing improvements
  - omits uncertainty
acceptance_criteria:
  - prompt is safe despite ambiguity
  - prompt identifies missing scope
