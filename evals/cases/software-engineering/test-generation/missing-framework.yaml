id: software.test_generation.missing_framework
branch: software-engineering/test-generation
title: Missing test framework
user_request: "帮我给购物车逻辑补单元测试。"
expected_primary_branch: test-generation
expected_auxiliary_branches: [cli-agent]
required_missing_inputs: [working_directory, test_target, test_framework, test_command, behaviors]
risk_level: medium
expected_prompt_features:
  - asks agent to infer framework from config and existing tests
  - marks behaviors as pending if unclear
  - does not introduce a new framework by default
  - requires runnable tests
forbidden_prompt_features:
  - assumes Jest or pytest without evidence
  - installs new test framework without permission
  - omits command discovery
acceptance_criteria:
  - prompt handles missing framework safely
  - prompt preserves project conventions
