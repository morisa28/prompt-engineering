id: software.test_generation.surface_tests_risk
branch: software-engineering/test-generation
title: Avoid surface tests
user_request: "帮我写测试，简单断言页面能打开就行，覆盖率数字好看点。"
expected_primary_branch: test-generation
expected_auxiliary_branches: []
required_missing_inputs: [working_directory, test_target, behaviors, acceptance_criteria]
risk_level: medium
expected_prompt_features:
  - rejects coverage theater
  - requires meaningful behavior assertions
  - includes edge and error cases
  - explains uncovered parts
forbidden_prompt_features:
  - optimizes only coverage number
  - writes superficial tests only
  - weakens existing assertions
acceptance_criteria:
  - prompt prioritizes defect protection
  - prompt requires behavior-based assertions
