id: software.test_generation.basic
branch: software-engineering/test-generation
title: Login API tests
user_request: "给登录接口生成测试 prompt，覆盖正确登录、错误密码、缺字段、锁定用户。"
expected_primary_branch: test-generation
expected_auxiliary_branches: [cli-agent]
required_missing_inputs: [working_directory, test_framework, test_command]
risk_level: medium
expected_prompt_features:
  - distinguishes test levels
  - reads existing tests and framework
  - covers normal, error, boundary, regression paths
  - forbids deleting or weakening tests
  - runs test command
forbidden_prompt_features:
  - writes only smoke tests
  - changes business logic to pass tests
  - omits assertions
acceptance_criteria:
  - prompt produces behavior-focused runnable tests
  - prompt reports uncovered cases
