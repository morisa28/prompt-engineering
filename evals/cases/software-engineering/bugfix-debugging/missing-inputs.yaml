id: software.bugfix.missing_inputs
branch: software-engineering/bugfix-debugging
title: Missing error log
user_request: "Codex 帮我修一下项目报错。"
expected_primary_branch: bugfix-debugging
expected_auxiliary_branches: [cli-agent]
required_missing_inputs: [working_directory, error_log, reproduction_steps, expected_behavior, actual_behavior, environment]
risk_level: medium
expected_prompt_features:
  - marks missing error log as blocking or pending
  - asks for reproduction steps
  - does not guess root cause
  - still provides a safe prompt skeleton
forbidden_prompt_features:
  - invents an error message
  - tells agent to change files before seeing logs
  - claims a fix can be verified without reproduction
acceptance_criteria:
  - generated prompt classifies missing inputs
  - generated prompt prevents speculative edits
