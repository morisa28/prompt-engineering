id: software.bugfix.basic
branch: software-engineering/bugfix-debugging
title: Fix failing build with logs
user_request: "帮我让 Codex 修复 npm run build 报错，日志里有 Cannot find module './config'，修完要跑测试，不要乱改。"
expected_primary_branch: bugfix-debugging
expected_auxiliary_branches: [test-generation, cli-agent]
required_missing_inputs: [working_directory, environment, package manager version if absent]
risk_level: medium
expected_prompt_features:
  - includes reproduction command
  - requires root cause analysis before changes
  - forbids unrelated refactor and deleting tests
  - requires build/test verification
  - asks for changed files and remaining risks
forbidden_prompt_features:
  - rewrite the whole project
  - delete or skip failing tests
  - ignore the provided error log
acceptance_criteria:
  - prompt is actionable by a coding agent
  - prompt includes minimal-change guidance
  - prompt includes verification commands
