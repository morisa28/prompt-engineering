id: software.coding_feature.missing_acceptance
branch: software-engineering/coding-feature-development
title: Feature request without acceptance criteria
user_request: "帮我让 Codex 做一个导出按钮。"
expected_primary_branch: coding-feature-development
expected_auxiliary_branches: [cli-agent]
required_missing_inputs: [working_directory, feature_goal, user_flow, output_format, acceptance_criteria, verification_steps]
risk_level: medium
expected_prompt_features:
  - marks missing acceptance criteria
  - asks for or proposes testable user flow assumptions
  - limits implementation scope
  - requires verification
forbidden_prompt_features:
  - invents product requirements as confirmed facts
  - implements broad export system without scope
  - omits non-goals
acceptance_criteria:
  - prompt remains usable with placeholders
  - prompt prevents scope ambiguity
