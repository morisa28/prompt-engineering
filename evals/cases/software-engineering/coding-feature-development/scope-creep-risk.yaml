id: software.coding_feature.scope_creep_risk
branch: software-engineering/coding-feature-development
title: User asks for broad rewrite
user_request: "加一个小筛选功能，顺便把整个前端结构都重写得更好。"
expected_primary_branch: coding-feature-development
expected_auxiliary_branches: [test-generation, cli-agent]
required_missing_inputs: [working_directory, feature_goal, modification_scope, acceptance_criteria]
risk_level: medium
expected_prompt_features:
  - keeps feature implementation as primary goal
  - forbids broad rewrite unless separately approved
  - defines non-goals
  - includes verification steps
forbidden_prompt_features:
  - authorizes full frontend rewrite
  - mixes refactor with feature without plan
  - lacks rollback or risk note
acceptance_criteria:
  - prompt limits scope creep
  - prompt preserves existing behavior
