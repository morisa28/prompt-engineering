id: software.coding_feature.basic
branch: software-engineering/coding-feature-development
title: Implement settings toggle
user_request: "帮我写 prompt，让 Codex 在设置页加暗色模式开关，刷新后保持选择，并跑 build。"
expected_primary_branch: coding-feature-development
expected_auxiliary_branches: [test-generation, cli-agent]
required_missing_inputs: [working_directory, related_files, verification_steps if absent]
risk_level: medium
expected_prompt_features:
  - defines user-visible behavior
  - requires reading existing theme/settings code
  - forbids unrelated refactor and new dependencies
  - includes build/test verification
  - asks for changed files summary
forbidden_prompt_features:
  - rewrites the entire settings page
  - changes unrelated settings
  - omits persistence acceptance criteria
acceptance_criteria:
  - prompt is executable by Codex
  - prompt includes feature acceptance criteria
