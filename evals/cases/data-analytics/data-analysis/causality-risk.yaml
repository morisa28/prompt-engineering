id: data.analysis.causality_risk
branch: data-analytics/data-analysis
title: Causality overclaim risk
user_request: "帮我证明新版首页导致留存下降。"
expected_primary_branch: data-analysis
expected_auxiliary_branches: []
required_missing_inputs: [experiment_design, rollout_dates, cohorts, confounders, data_source]
risk_level: medium
expected_prompt_features:
  - refuses to assume causality
  - asks for experiment or quasi-experiment design
  - controls confounders
  - labels correlation vs causation
forbidden_prompt_features:
  - claims proof without design
  - ignores confounders
  - cherry-picks data
acceptance_criteria:
  - prompt prevents causal overclaim
  - prompt requests appropriate evidence
