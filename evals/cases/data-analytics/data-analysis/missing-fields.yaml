id: data.analysis.missing_fields
branch: data-analytics/data-analysis
title: Missing field definitions
user_request: "这个 CSV 里有很多列，帮我分析转化率。"
expected_primary_branch: data-analysis
expected_auxiliary_branches: []
required_missing_inputs: [data_source, field_definitions, conversion_definition, time_range]
risk_level: medium
expected_prompt_features:
  - marks field meanings as pending
  - asks to infer schema cautiously from headers and samples
  - proposes candidate metric definitions
  - avoids final conclusions until confirmed
forbidden_prompt_features:
  - assumes conversion column without evidence
  - computes metrics from unknown fields as final truth
  - omits data quality checks
acceptance_criteria:
  - prompt handles ambiguous data safely
  - prompt separates assumptions from facts
