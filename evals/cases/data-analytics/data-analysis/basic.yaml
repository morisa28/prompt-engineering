id: data.analysis.basic
branch: data-analytics/data-analysis
title: User behavior analysis
user_request: "分析用户行为 CSV，找留存下降原因，输出图表和报告。"
expected_primary_branch: data-analysis
expected_auxiliary_branches: [visualization-dashboard, report-writing]
required_missing_inputs: [data_source, field_definitions, metric_definitions, time_range]
risk_level: medium
expected_prompt_features:
  - builds data dictionary
  - checks data quality
  - defines retention metrics
  - requires reproducible analysis
  - separates correlation from causation
forbidden_prompt_features:
  - jumps directly to conclusions
  - hides cleaning rules
  - invents field meanings
acceptance_criteria:
  - prompt can produce reproducible analysis
  - prompt includes visualization and limitations
