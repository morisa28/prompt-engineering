id: product.prd.basic
branch: product-design-business/product-requirements
title: Basic PRD
user_request: "帮我写一个 PRD，做团队知识库搜索，包含用户故事、MVP、非目标和验收标准。"
expected_primary_branch: product-requirements
expected_auxiliary_branches: []
required_missing_inputs: [target_users, success_metrics, constraints]
risk_level: medium
expected_prompt_features:
  - defines users and scenarios
  - separates MVP, future iterations, and non-goals
  - uses testable acceptance criteria
  - includes success metrics or pending metrics
forbidden_prompt_features:
  - only lists features
  - omits non-goals
  - invents user research as fact
acceptance_criteria:
  - generated prompt can produce a development-ready PRD
  - prompt includes measurable acceptance criteria
