id: product.prd.dev_agent_output
branch: product-design-business/product-requirements
title: PRD to development agent
user_request: "把这个 PRD 需求写出来，并生成一段给 Codex 实现的 prompt。"
expected_primary_branch: product-requirements
expected_auxiliary_branches: [coding-feature-development, test-generation]
required_missing_inputs: [working_directory, technical_context, verification_steps]
risk_level: medium
expected_prompt_features:
  - separates PRD from development-agent prompt
  - includes implementation boundaries
  - includes acceptance criteria and verification
  - forbids unrelated refactor
forbidden_prompt_features:
  - merges product requirements and implementation into vague prose
  - tells Codex to freely choose scope
  - lacks validation instructions
acceptance_criteria:
  - prompt can produce both PRD and actionable Codex task
  - development prompt has clear constraints
