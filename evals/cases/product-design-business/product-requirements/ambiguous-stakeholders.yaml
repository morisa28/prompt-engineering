id: product.prd.ambiguous_stakeholders
branch: product-design-business/product-requirements
title: Ambiguous stakeholders
user_request: "帮我写一个企业后台 PRD。"
expected_primary_branch: product-requirements
expected_auxiliary_branches: []
required_missing_inputs: [product_goal, target_users, user_scenarios, mvp_scope, success_metrics]
risk_level: medium
expected_prompt_features:
  - identifies missing users and stakeholders
  - marks assumptions as pending
  - asks for MVP and non-goals
  - avoids inventing business context
forbidden_prompt_features:
  - assumes a specific industry as fact
  - writes final KPI without basis
  - omits open questions
acceptance_criteria:
  - prompt supports clarification or placeholders
  - prompt prevents fake specificity
