id: ai.rag.basic
branch: ai-systems/knowledge-base-rag
title: Internal RAG with citations
user_request: "帮我设计公司内部文档 RAG，回答必须带引用，检索不到就拒答。"
expected_primary_branch: knowledge-base-rag
expected_auxiliary_branches: [documentation-analysis]
required_missing_inputs: [knowledge_sources, target_users, access_control, evaluation_questions, freshness_requirement]
risk_level: high
expected_prompt_features:
  - defines knowledge sources and scope
  - includes chunking and metadata
  - requires citations
  - defines no-evidence refusal
  - includes evaluation metrics
forbidden_prompt_features:
  - allows answers without sources
  - ignores document freshness
  - omits permissions
acceptance_criteria:
  - prompt defines a verifiable RAG design
  - prompt controls hallucination
