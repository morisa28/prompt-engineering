id: ai.rag.permission_control
branch: ai-systems/knowledge-base-rag
title: Department permissions
user_request: "做 RAG 时销售和研发文档权限不同，不能串权限。"
expected_primary_branch: knowledge-base-rag
expected_auxiliary_branches: [security-threat-modeling]
required_missing_inputs: [user_roles, document_permissions, audit_requirements, knowledge_sources]
risk_level: high
expected_prompt_features:
  - requires access control schema
  - applies permission filtering before and after retrieval
  - includes audit logs
  - tests permission leakage
forbidden_prompt_features:
  - retrieves all documents then filters only in answer text
  - ignores role-based permissions
  - omits leakage evals
acceptance_criteria:
  - prompt includes permission-control design
  - prompt includes permission test cases
