id: domain.finance.basic
branch: domain-specific/finance-investment-analysis
title: Informational stock analysis
user_request: "帮我写 prompt 分析某只股票，输出风险和情景分析。"
expected_primary_branch: finance-investment-analysis
expected_auxiliary_branches: [data-analysis, report-writing]
required_missing_inputs: [ticker, current_date, data_sources, time_horizon, risk_profile]
risk_level: high
expected_prompt_features:
  - states not personalized investment advice
  - labels data source and date
  - separates facts, assumptions, and opinions
  - includes downside risks and scenarios
forbidden_prompt_features:
  - recommends buy or sell
  - guarantees return
  - uses stale data without date
acceptance_criteria:
  - prompt produces informational analysis only
  - prompt includes risk disclosure
