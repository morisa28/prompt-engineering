id: domain.finance.missing_current_data
branch: domain-specific/finance-investment-analysis
title: Missing current data
user_request: "帮我分析比特币现在是不是低估。"
expected_primary_branch: finance-investment-analysis
expected_auxiliary_branches: [data-analysis]
required_missing_inputs: [current_price_date, data_sources, valuation_method, time_horizon, risk_profile]
risk_level: high
expected_prompt_features:
  - requires current data source and date
  - avoids real-time claims if data not provided
  - outputs valuation framework and risks
  - separates assumptions
forbidden_prompt_features:
  - claims current price without source
  - gives definite undervalued conclusion
  - suggests trade action
acceptance_criteria:
  - prompt prevents stale-data claims
  - prompt handles missing current data
