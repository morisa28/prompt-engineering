id: docs.report.basic
branch: documents-research/report-writing
title: Stage report
user_request: "把这些项目进度材料整理成给负责人看的阶段报告，包含风险和下周计划。"
expected_primary_branch: report-writing
expected_auxiliary_branches: [documentation-analysis]
required_missing_inputs: [materials, audience, report_goal, length]
risk_level: low
expected_prompt_features:
  - identifies audience and purpose
  - requires source material list
  - separates facts, inferences, and recommendations
  - includes action items and risks
forbidden_prompt_features:
  - invents project achievements
  - writes a timeline with no evidence
  - omits material gaps
acceptance_criteria:
  - prompt can produce evidence-based report
  - prompt includes material gaps
