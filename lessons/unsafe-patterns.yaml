lessons:
  - id: lesson.unsafe-patterns.delete-tests-to-pass.001
    type: unsafe-pattern
    related_resources:
      - "@branch://software-engineering/bugfix-debugging"
      - "@branch://software-engineering/test-generation"
      - "@eval://software-engineering/bugfix-debugging/unsafe-shortcut"
    trigger: "用户要求“直接删掉失败测试”“跳过测试”或“注释掉断言”。"
    failure_mode: "prompt 允许删除测试或降低断言来制造通过结果。"
    root_cause: "bugfix 约束没有把测试完整性作为硬边界。"
    fix: "拒绝该 shortcut；要求保留测试、修复根因、必要时新增回归测试，并报告无法通过的真实原因。"
    update_targets:
      - branches/software-engineering/bugfix-debugging.md
      - branches/software-engineering/test-generation.md
      - checklists.md
    severity: high
    status: open

  - id: lesson.unsafe-patterns.medical-diagnosis-overreach.001
    type: unsafe-pattern
    related_resources:
      - "@branch://domain-specific/medical-health-info"
      - "@safety://medical-boundary"
      - "@eval://domain-specific/medical-health-info/diagnosis-boundary"
    trigger: "用户要求 AI 判断症状是什么病、给药、停药或换药。"
    failure_mode: "prompt 诱导模型输出诊断、处方或用药调整。"
    root_cause: "医疗边界没有被注入最终 prompt，或安全声明只写在文档中没有执行。"
    fix: "最终 prompt 必须明确不诊断、不处方、不停药换药，改为症状整理、红旗信号、就医准备和咨询医生问题。"
    update_targets:
      - safety/medical-boundary.md
      - router.md
      - examples.md
    severity: high
    status: open

  - id: lesson.unsafe-patterns.legal-final-conclusion.001
    type: unsafe-pattern
    related_resources:
      - "@branch://domain-specific/legal-policy-review"
      - "@safety://legal-boundary"
      - "@eval://domain-specific/legal-policy-review/legal-advice-boundary"
    trigger: "用户要求判断合同是否合法、能不能签、是否一定胜诉。"
    failure_mode: "prompt 要求模型给最终法律结论。"
    root_cause: "法律任务没有要求司法辖区、材料上下文和律师复核路径。"
    fix: "改为条款摘要、风险点、待确认问题、律师咨询问题；禁止最终法律结论。"
    update_targets:
      - safety/legal-boundary.md
      - branches/domain-specific/legal-policy-review.md
      - checklists.md
    severity: high
    status: open

  - id: lesson.unsafe-patterns.financial-direct-trade.001
    type: unsafe-pattern
    related_resources:
      - "@branch://domain-specific/finance-investment-analysis"
      - "@safety://financial-boundary"
      - "@eval://domain-specific/finance-investment-analysis/investment-advice-boundary"
    trigger: "用户要求 AI 判断是否买入、卖出或持有具体资产。"
    failure_mode: "prompt 输出个性化交易指令或保证收益。"
    root_cause: "金融分析没有区分事实、假设、观点和风险，也没有限制个性化建议。"
    fix: "改为信息性研究框架、情景分析、风险披露和专业咨询问题；禁止直接买卖建议。"
    update_targets:
      - safety/financial-boundary.md
      - branches/domain-specific/finance-investment-analysis.md
      - examples.md
    severity: high
    status: open

  - id: lesson.unsafe-patterns.rag-unsourced-answer.001
    type: unsafe-pattern
    related_resources:
      - "@branch://ai-systems/knowledge-base-rag"
      - "@safety://privacy-boundary"
      - "@eval://ai-systems/knowledge-base-rag/citation-required"
    trigger: "RAG prompt 允许模型在没有检索证据时凭常识回答。"
    failure_mode: "回答无法溯源，可能泄露或编造内部知识。"
    root_cause: "没有把 citation、无依据拒答和权限过滤设为生成前置条件。"
    fix: "强制引用来源；知识库未命中时拒答或澄清；权限过滤必须在检索和生成前后执行。"
    update_targets:
      - branches/ai-systems/knowledge-base-rag.md
      - safety/privacy-boundary.md
      - checklists.md
    severity: high
    status: open
